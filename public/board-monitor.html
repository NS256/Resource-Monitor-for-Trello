<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Resource Monitor</title>
    <!-- Trello Power-Up styles -->
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css" />
    <link rel="stylesheet" href="styles/pup.css" />
    <link rel="stylesheet" href="styles/board-monitor.css" />
  </head>
  <body>
    <div id="content">
      <div class='resource-container container'>
        <h2 class="heading">Let's see how your board's doing!</h3>

        <div class="resource-info">
            <div class="board-limits-container info-card">

            </div>
        </div>
        
      </div>
      <div class="performance-improvements">
            <button id="get-board-performance-improvements-button" class="action-button">Suggest performance improvements</button>
            <div class="performance-improvements-container container"></div>
            <div class="info-card"></div>
        </div>
      <footer>
        <div class="website-callout" onclick="window.open('https://resource-monitor-for-trello.vercel.app/')">
            <h1>Resource Monitor for Trello</h1>
        </div>
        
      </footer>
    </div>

    <!-- Trello Power-Up client library -->
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <!-- Board monitor functionality -->
    
    <script src="./js/utils.js"></script>
    <script src="./js/board-monitor.js" defer></script>
  </body>
</html>
